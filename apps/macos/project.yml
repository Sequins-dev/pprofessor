name: PProfessor
options:
  bundleIdPrefix: dev.sequins
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false

packages:
  PProfessorKit:
    path: .

targetTemplates:
  PProfessorApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/PProfessor
        excludes:
          - "**/*.xcassets"
      - path: Sources/PProfessor/Assets.xcassets
        type: folder
    resources:
      - path: Sources/PProfessor/Assets.xcassets
      - path: Sources/PProfessor/AppIcon.icns
    dependencies:
      - package: PProfessorKit
        product: PProfessorKit
      - sdk: SwiftUI.framework
      - sdk: AppKit.framework
    settings:
      base:
        PRODUCT_NAME: PProfessor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        ENABLE_HARDENED_RUNTIME: true
    info:
      path: Sources/PProfessor/Info.plist
      properties:
        CFBundleDisplayName: PProfessor
        CFBundleIconFile: AppIcon
        LSMinimumSystemVersion: "15.0"
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.developer-tools
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: true

targets:
  PProfessor:
    templates:
      - PProfessorApp
    sources:
      - path: ../../target/cli-helper/pprofessor
        name: pprofessor
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Helpers
    dependencies:
      - package: PProfessorKit
        product: PProfessorCaptureSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.sequins.pprofessor
    entitlements:
      path: Sources/PProfessor/PProfessor.entitlements
      properties:
        com.apple.security.app-sandbox: false

  PProfessorAppStore:
    templates:
      - PProfessorApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.sequins.pprofessor
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) APP_STORE"
    entitlements:
      path: Sources/PProfessor/PProfessorAppStore.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.network.server: true

  PProfessorKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PProfessorKitTests
    dependencies:
      - package: PProfessorKit
        product: PProfessorKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.sequins.pprofessor.tests
        GENERATE_INFOPLIST_FILE: true

schemes:
  PProfessor:
    build:
      targets:
        PProfessor: all
    run:
      config: Debug
      executable: PProfessor
    test:
      config: Debug
      targets:
        - PProfessorKitTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  PProfessorAppStore:
    build:
      targets:
        PProfessorAppStore: all
    run:
      config: Debug
      executable: PProfessorAppStore
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
